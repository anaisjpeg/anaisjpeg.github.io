<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pointage ADIL</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
    button {
      padding: 15px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    input {
      padding: 10px;
      margin: 10px;
    }
  </style>
</head>

<body>

<h2>Pointage</h2>

<input type="text" id="nom" placeholder="Votre nom">

<br>

<button onclick="envoyer('arrivee')">Arrivée</button>
<button onclick="envoyer('depart')">Départ</button>
<button onclick="envoyer('exterieur')">Mission extérieure</button>

<p id="message"></p>

<script>
const URL = "https://script.google.com/macros/s/AKfycbwMiy_L_kO86gWbsFamIA_nPYLqRPpdbmZpK8q7yAGIgaIxPfsv4du8VBWe_fD8PdxY/exec";

function envoyer(type) {
  const nom = document.getElementById("nom").value;

  if (!nom) {
    alert("Entrez votre nom");
    return;
  }

  const data = new URLSearchParams();
  data.append("nom", nom);
  data.append("type", type);

  fetch(URL, {
    method: "POST",
    body: data
  })
  .then(res => res.text()) // ⚠️ pas json()
  .then(() => {
    document.getElementById("message").innerText = "Pointage enregistré ✔️";
  })
  .catch(err => {
    console.error(err);
    document.getElementById("message").innerText = "Erreur ❌";
  });
}
</script>

</body>
</html>
