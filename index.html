<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pointage ADIL</title>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f9f5f0;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 400px;
  margin: 80px auto;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  text-align: center;
}

.logo {
  max-width: 120px;
  margin-bottom: 15px;
}

h2 {
  color: #575756;
  margin-bottom: 20px;
}

input, select {
  width: 90%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

button {
  width: 45%;
  padding: 12px;
  margin: 10px 5px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  color: white;
}

.debut {
  background-color: #ED6A32;
}

.fin {
  background-color: #575756;
}
  
.loading {
  opacity: 0.6;
  pointer-events: none;
}

.spinner {
  border: 4px solid #f3f3f3;
  border-top: 4px solid #ED6A32;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  animation: spin 1s linear infinite;
  margin: 10px auto;
  display: none;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
  
button:hover {
  opacity: 0.9;
}

#message {
  margin-top: 15px;
  line-height: 1.6;
  color: #ED6A32;
}
</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo">

  <h2>Pointage</h2>

  <select id="nom"></select>

  <input type="text" id="commentaire" placeholder="Commentaire (facultatif)">

  <div>
    <button class="debut" onclick="envoyer('debut')">Début du travail</button>
    <button class="fin" onclick="envoyer('fin')">Fin du travail</button>
  </div>

  <p id="message"></p>
  <div id="spinner" class="spinner"></div>
</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbwMiy_L_kO86gWbsFamIA_nPYLqRPpdbmZpK8q7yAGIgaIxPfsv4du8VBWe_fD8PdxY/exec";


function envoyer(type) {
  const nom = document.getElementById("nom").value;
  const commentaire = document.getElementById("commentaire").value;
  const buttons = document.querySelectorAll("button");
  const spinner = document.getElementById("spinner");

  if (!nom) {
    alert("Entrez votre prénom");
    return;
  }

  buttons.forEach(b => b.disabled = true);
  spinner.style.display = "block";

  localStorage.setItem("nom", nom);
  document.getElementById("nom").value = nom;

  const url = URL
    + "?nom=" + encodeURIComponent(nom)
    + "&type=" + encodeURIComponent(type)
    + "&commentaire=" + encodeURIComponent(commentaire);

  fetch(url)
    .then(() => {
      let message = "";
    
      if (type === "debut") {
        message = `
          <div style="font-weight:bold;">
            ✅ Pointage enregistré
          </div>
          <div color:#575756;">
            Bonne journée ${nom} 😊
          </div>
        `;
      } else if (type === "fin") {
        message = `
          <div style="color:#575756; font-weight:bold;">
            ✅ Pointage enregistré
          </div>
          <div style="margin-top:10px;">
            Bonne soirée ${nom} 😁
          </div>
        `;
      }
    
      afficherMessage(message);
      document.getElementById("commentaire").value = "";
    })
    .catch(() => {
      afficherMessage("❌ Erreur");
    })
    .finally(() => {
      buttons.forEach(b => b.disabled = false);
      spinner.style.display = "none";
    });
}

function afficherMessage(msg) {
  const el = document.getElementById("message");
  el.innerHTML = msg;

  setTimeout(() => {
    el.innerHTML = "";
  }, 5000); // 5 secondes
}

function chargerEmployes() {
  fetch(URL + "?action=getEmployes")
    .then(res => res.json())
    .then(data => {
      const select = document.getElementById("nom");
      select.innerHTML = '<option value="">Choisir votre nom</option>';

      data.forEach(e => {
        const option = document.createElement("option");
        option.value = e[0];
        option.textContent = e[0];
        select.appendChild(option);
      });
    });
}

window.onload = () => {
  chargerEmployesCache();
  chargerEmployesAPI();

  const saved = localStorage.getItem("nom");
  if (saved) {
    setTimeout(() => {
      document.getElementById("nom").value = saved;
    }, 100);
  }
};

function chargerEmployesCache() {
  const cached = localStorage.getItem("employes");

  if (cached) {
    const data = JSON.parse(cached);
    updateSelect(data);
  }
}

function chargerEmployesAPI() {
  fetch(URL + "?action=getEmployes")
    .then(res => res.json())
    .then(data => {
      localStorage.setItem("employes", JSON.stringify(data));
      updateSelect(data);
    })
    .catch(err => {
      console.error("Erreur chargement employés", err);
    });
}

function updateSelect(data) {
  const select = document.getElementById("nom");

  const currentValue = select.value || localStorage.getItem("nom");

  select.innerHTML = '<option value="">Choisir votre nom</option>';

  data.forEach(e => {
    const option = document.createElement("option");
    option.value = e[0];
    option.textContent = e[0];

    if (e[0] === currentValue) {
      option.selected = true;
    }

    select.appendChild(option);
  });
}
  
</script>

</body>
</html>
