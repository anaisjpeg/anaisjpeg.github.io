<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pointage ADIL</title>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f9f5f0;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 400px;
  margin: 80px auto;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  text-align: center;
}

.logo {
  max-width: 120px;
  margin-bottom: 15px;
}

h2 {
  color: #575756;
  margin-bottom: 20px;
}

input, select {
  width: 90%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

button {
  width: 45%;
  padding: 12px;
  margin: 10px 5px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  color: white;
}

.arrivee {
  background-color: #ED6A32;
}

.depart {
  background-color: #575756;
}
  
.loading {
  opacity: 0.6;
  pointer-events: none;
}

.spinner {
  border: 4px solid #f3f3f3;
  border-top: 4px solid #ED6A32;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  animation: spin 1s linear infinite;
  margin: 10px auto;
  display: none;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
  
button:hover {
  opacity: 0.9;
}

#message {
  margin-top: 15px;
  font-weight: bold;
  color: #ED6A32;
}
</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo">

  <h2>Pointage</h2>

  <!-- Nom -->
  <select id="nom">
    <option value="">Choisir votre nom</option>
    <option>Anaïs</option>
    <option>Cloé</option>
    <option>Delphine</option>
    <option>Elsa</option>
    <option>Frédéric</option>
    <option>Julia</option>
    <option>Mélissa</option>
    <option>Thibaut</option>
    <option>Thomas</option>
    <option>Valentin</option>
    <option>Véronique</option>
  </select>

  <!-- Commentaire -->
  <input type="text" id="commentaire" placeholder="Commentaire (facultatif)">

  <div>
    <button class="arrivee" onclick="envoyer('arrivee')">Début du travail</button>
    <button class="depart" onclick="envoyer('depart')">Fin du travail</button>
  </div>

  <p id="message"></p>
  <div id="spinner" class="spinner"></div>
</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbwMiy_L_kO86gWbsFamIA_nPYLqRPpdbmZpK8q7yAGIgaIxPfsv4du8VBWe_fD8PdxY/exec";

/* 🔹 Garder le nom en mémoire */
window.onload = () => {
  const saved = localStorage.getItem("nom");
  if (saved) document.getElementById("nom").value = saved;
};

function envoyer(type) {
  const nom = document.getElementById("nom").value;
  const commentaire = document.getElementById("commentaire").value;
  const buttons = document.querySelectorAll("button");
  const spinner = document.getElementById("spinner");

  if (!nom) {
    alert("Entrez votre prénom");
    return;
  }

  buttons.forEach(b => b.disabled = true);
  spinner.style.display = "block";

  localStorage.setItem("nom", nom);

  const url = URL
    + "?nom=" + encodeURIComponent(nom)
    + "&type=" + encodeURIComponent(type)
    + "&commentaire=" + encodeURIComponent(commentaire);

  fetch(url)
    .then(() => {
      afficherMessage("✅ Pointage enregistré");
      document.getElementById("commentaire").value = "";
    })
    .catch(() => {
      afficherMessage("❌ Erreur");
    })
    .finally(() => {
      buttons.forEach(b => b.disabled = false);
      spinner.style.display = "none";
    });
}

function afficherMessage(msg) {
  const el = document.getElementById("message");
  el.innerText = msg;

  setTimeout(() => {
    el.innerText = "";
  }, 5000); // 5 secondes
}
  
</script>

</body>
</html>
